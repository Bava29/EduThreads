<!DOCTYPE html>
<html lang="en">

<head>

    <!--=========================================
                META TAGS
    ==========================================-->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--=========================================
                WEBSITE TITLE
    ==========================================-->

    <title>EduThreads</title>

    <!--=========================================
                FAVICON
    ==========================================-->

    <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon">

    <!--=========================================
                GOOGLE FONTS
    ==========================================-->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
        rel="stylesheet">

    <!--=========================================
                FONT AWESOME
    ==========================================-->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!--=========================================
                CSS
    ==========================================-->

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">

</head>

<body>




    <!--=========================================
            LOGIN SECTION START
==========================================-->

    <section class="auth-section">

        <!-- Background Shapes -->

        <div class="shape shape-1"></div>

        <div class="shape shape-2"></div>

        <div class="shape shape-3"></div>

        <div class="shape-overlay"></div>

        <div class="global-container">

            <!--========== TOP ACTIONS ==========-->

            <div class="auth-top-actions">
                <button class="icon-btn" data-theme-toggle>
                    <i class="fa-solid fa-moon"></i>
                </button>

                <button class="icon-btn" data-rtl-toggle>
                    <i class="fa-solid fa-arrow-right-arrow-left"></i>
                </button>
            </div>

            <!--========== LOGIN CARD ==========-->

            <div class="auth-card">

                <!-- Logo -->

                <a href="index.html" class="auth-logo">

                    <img src="images/logo.png" alt="EduThreads Logo">

                </a>

                <!-- Badge -->

                <span class="section-badge">

                    Welcome Back

                </span>

                <!-- Heading -->

                <h1>

                    Sign In To Your Account

                </h1>

                <p>

                    Access your orders, school uniform collections,
                    and exclusive offers.

                </p>

                <!--========== FORM ==========-->

                <form action="#">

                    <!-- Email -->

                    <div class="input-group">

                        <label>

                            Email Address

                        </label>

                        <input type="email" placeholder="Enter your email address">

                    </div>

                    <!-- Password -->

                    <div class="input-group">

                        <label>

                            Password

                        </label>

                        <div class="password-box">

                            <input type="password" placeholder="Enter your password">

                            <button type="button" class="password-toggle">

                                <i class="fa-regular fa-eye"></i>

                            </button>

                        </div>

                    </div>

                    <!-- Remember -->

                    <div class="remember-row">

                        <label class="checkbox">

                            <input type="checkbox">

                            <span>

                                Remember Me

                            </span>

                        </label>

                        <a href="#">

                            Forgot Password?

                        </a>

                    </div>

                    <!-- Button -->

                    <button class="primary-btn auth-btn">

                        Login

                    </button>

                </form>

                <!-- Divider -->

                <div class="auth-divider">

                    <span>

                        Or Continue With

                    </span>

                </div>

                <div class="social-icons">

                    <a href="#" class="social-btn google">

                        <img src="images/google-logo.svg" alt="Google">

                    </a>


                    <a href="#" class="social-btn facebook">

                        <i class="fa-brands fa-facebook-f"></i>

                    </a>

                    <a href="#" class="social-btn apple">

                        <i class="fa-brands fa-apple"></i>

                    </a>

                </div>

                <!-- Bottom -->

                <div class="auth-footer">

                    Don't have an account?

                    <a href="signup.html">

                        Create Account

                    </a>

                </div>

            </div>

        </div>

    </section>

    <!--=========================================
            LOGIN SECTION END
==========================================-->


    <script src="js/main.js"></script>

</body>

</html>
