<!DOCTYPE html>
<html lang="en">

<head>

    <!--=========================================
                META TAGS
    ==========================================-->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--=========================================
                WEBSITE TITLE
    ==========================================-->

    <title>EduThreads</title>

    <!--=========================================
                FAVICON
    ==========================================-->

    <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon">

    <!--=========================================
                GOOGLE FONTS
    ==========================================-->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"
        rel="stylesheet">

    <!--=========================================
                FONT AWESOME
    ==========================================-->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!--=========================================
                CSS
    ==========================================-->

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">

</head>

<body>


    <!--=========================================
            REGISTER START
    ==========================================-->

    <section class="register-section">

        <!-- Background Shapes -->

        <div class="register-shape register-shape-1"></div>

        <div class="register-shape register-shape-2"></div>

        <div class="register-shape register-shape-3"></div>

        <div class="register-overlay"></div>

        <div class="global-container">

            <!--========== TOP ACTIONS ==========-->

            <div class="register-top-actions">
                <button class="icon-btn" data-theme-toggle>
                    <i class="fa-solid fa-moon"></i>
                </button>

                <button class="icon-btn" data-rtl-toggle>
                    <i class="fa-solid fa-arrow-right-arrow-left"></i>
                </button>
            </div>

            <!--========== REGISTER CARD ==========-->

            <div class="register-card">

                <!--========== LOGO ==========-->

                <a href="index.html" class="register-logo">

                    <img src="images/logo.png" alt="EduThreads Logo">

                </a>

                <!--========== BADGE ==========-->

                <span class="section-badge">

                    Join EduThreads

                </span>

                <!--========== TITLE ==========-->

                <h1>

                    Create Your Account

                </h1>

                <p>

                    Create your EduThreads account to shop premium school uniforms,
                    track your orders, save favourites, and enjoy a faster checkout experience.

                </p>

                <!--========== FORM ==========-->

                <form action="#">

                    <!-- Full Name -->

                    <div class="register-input-group">

                        <label>

                            Full Name

                        </label>

                        <input type="text" placeholder="Enter your full name">

                    </div>

                    <!-- Email -->

                    <div class="register-input-group">

                        <label>

                            Email Address

                        </label>

                        <input type="email" placeholder="Enter your email address">

                    </div>

                    <!-- Phone -->

                    <div class="register-input-group">

                        <label>

                            Phone Number

                        </label>

                        <input type="tel" placeholder="Enter your phone number">

                    </div>

                    <!-- Password -->

                    <div class="register-input-group">

                        <label>

                            Password

                        </label>

                        <div class="register-password-box">

                            <input type="password" placeholder="Create a password">

                            <button type="button" class="register-password-toggle">

                                <i class="fa-regular fa-eye"></i>

                            </button>

                        </div>

                    </div>

                    <!-- Confirm Password -->

                    <div class="register-input-group">

                        <label>

                            Confirm Password

                        </label>

                        <div class="register-password-box">

                            <input type="password" placeholder="Confirm your password">

                            <button type="button" class="register-password-toggle">

                                <i class="fa-regular fa-eye"></i>

                            </button>

                        </div>

                    </div>

                    <!-- Terms -->

                    <div class="register-terms-row">

                        <label class="register-checkbox">

                            <input type="checkbox">

                            <span>

                                I agree to the

                                <a href="#">

                                    Terms & Conditions

                                </a>

                            </span>

                        </label>

                    </div>

                    <!-- Register Button -->

                    <button type="submit" class="primary-btn register-btn">
                        Create Account
                    </button>
                </form>

                <!--========== DIVIDER ==========-->

                <div class="register-divider">

                    <span>

                        Or Sign Up With

                    </span>

                </div>

                <!--========== SOCIAL LOGIN ==========-->

                <div class="register-social-icons">

                    <!-- Google -->

                    <a href="#" class="register-social-btn google">

                        <img src="images/google-logo.svg" alt="Google">

                    </a>

                    <!-- Facebook -->

                    <a href="#" class="register-social-btn facebook">

                        <i class="fa-brands fa-facebook-f"></i>

                    </a>

                    <!-- Apple -->

                    <a href="#" class="register-social-btn apple">

                        <i class="fa-brands fa-apple"></i>

                    </a>

                </div>

                <!--========== FOOTER ==========-->

                <div class="register-footer">

                    Already have an account?

                    <a href="login.html">

                        Login

                    </a>

                </div>

            </div>

        </div>

    </section>

    <!--=========================================
            REGISTER END
    ==========================================-->


    <script src="js/main.js"></script>

</body>

</html>
